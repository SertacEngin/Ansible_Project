name: Deploy Application (Ansible)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible python3-pip

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-passlib || true
          python3 -m pip install --upgrade pip
          python3 -m pip install passlib

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_capgemini
          chmod 600 ~/.ssh/ansible_capgemini

      - name: Run Ansible Playbook
        working-directory: ansible
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook \
            -i inventories/production/inventory.yml \
            playbooks/site.yml \
            --private-key ~/.ssh/ansible_capgemini
