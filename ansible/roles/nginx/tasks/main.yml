- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Start and enable nginx
  service:
    name: nginx
    state: started
    enabled: true

- name: Deploy index page
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
  notify: restart nginx

- name: Add health endpoint
  copy:
    dest: /var/www/html/health.html
    content: |
      OK - {{ inventory_hostname }} is running
